<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Venezuelan Gradient for Border -->
    <linearGradient id="venezuela-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#EAB308" /> <!-- Yellow -->
      <stop offset="50%" stopColor="#2563EB" /> <!-- Blue -->
      <stop offset="100%" stopColor="#DC2626" /> <!-- Red -->
    </linearGradient>

    <!-- Drop shadows for premium depth -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#EAB308" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#2563EB" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#DC2626" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Outer tricolor ring -->
  <rect 
    x="3" 
    y="3" 
    width="94" 
    height="94" 
    rx="28" 
    fill="none" 
    stroke="url(#venezuela-gradient)" 
    stroke-width="3.5" 
    filter="url(#shadow)"
  />

  <!-- Squircle Button Body -->
  <rect 
    x="5" 
    y="5" 
    width="90" 
    height="90" 
    rx="25" 
    fill="#FFFFFF" 
    stroke="#E2E8F0"
    stroke-width="0.5"
  />

  <!-- Lightning Bolt (⚡) -->
  <path 
    d="M 54 22 L 31 52 H 48 L 44 78 L 69 48 H 52 L 54 22 Z"
    fill="#1E293B"
    stroke="#1E293B"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- SOS Emergency Badge -->
  <g transform="translate(82, 18)">
    <rect 
      x="-15" 
      y="-6" 
      width="24" 
      height="12" 
      rx="6" 
      fill="#DC2626" 
      stroke="#FFFFFF"
      stroke-width="1"
    />
    <text 
      x="-3" 
      y="3.2" 
      fill="#FFFFFF" 
      font-size="7.5" 
      font-weight="900" 
      font-family="system-ui, -apple-system, sans-serif" 
      text-anchor="middle"
      letter-spacing="0.5"
    >
      SOS
    </text>
  </g>
</svg>